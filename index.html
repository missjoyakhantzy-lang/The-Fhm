<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aavira - Customer Notifications</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f8fafc; }
        .btn { padding: 15px 30px; background: #D81B60; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Aavira Customer App 🛍️</h2>
    <p>Click below to allow order updates!</p>
    <button class="btn" onclick="requestPermission()">Enable Notifications</button>
    <p id="status" style="color: green; margin-top: 20px;"></p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

        // Aapki Aavira Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCMGx6C5_al22KjCmdhGVKugJoR2UmZ1Ng",
            authDomain: "aavira-co-in.firebaseapp.com",
            projectId: "aavira-co-in",
            storageBucket: "aavira-co-in.firebasestorage.app",
            messagingSenderId: "247971292356",
            appId: "1:247971292356:web:82780c6dffe9ba530f9591"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messaging = getMessaging(app);
        
        // Aapki asli VAPID Key jo aapne di thi
        const vapidKey = 'BJZeVZEBGhlMYqbk_D0R_F5l4sTkCFJEGWOZVSM6vRKfZxjUAsS7AUO5zBIU6t90PZyzRx5t9zPClwQNjSEHWuo'; 
        
        // Test ke liye ek dummy phone number (API me yahi use hoga)
        const dummyPhone = '9876543210'; 

        // Notification Permission maangne ka function
        window.requestPermission = async function() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    document.getElementById('status').innerText = "Permission Granted! Generating Token...";
                    
                    const currentToken = await getToken(messaging, { vapidKey: vapidKey });
                    if (currentToken) {
                        // Token ko Firestore me 'users' collection me save karna
                        await setDoc(doc(db, "users", dummyPhone), {
                            phone: dummyPhone,
                            fcmToken: currentToken
                        }, { merge: true });
                        
                        document.getElementById('status').innerText = "Ready! Backend se notification aane ka wait kijiye...";
                        console.log("Token Saved:", currentToken);
                    }
                } else {
                    document.getElementById('status').innerText = "Permission Denied. Please allow notifications in browser settings.";
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').innerText = "Error! (Localhost ya HTTPS par hi chalayein)";
            }
        }

        // Jab customer website par hi ho aur notification aaye
        onMessage(messaging, (payload) => {
            alert(`New Update: ${payload.notification.title}\n${payload.notification.body}`);
        });
    </script>
</body>
</html>
