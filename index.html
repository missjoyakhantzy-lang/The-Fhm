            const privacyIconHtml = post.privacy === 'private' ? '<i class="fa-solid fa-lock" style="font-size:10px; color:var(--danger-color); margin-left:6px;"></i>' : '';
            const locationHtml = post.location ? `<div style="font-size:11px; color:var(--text-muted); display:flex; align-items:center; gap:4px; margin-top:2px;"><i class="fa-solid fa-location-dot" style="color:var(--danger-color);"></i> ${escapeHTML(post.location)}</div>` : '';
            const audioHtml = post.hasAudio ? `<div style="width:100%; margin-bottom:14px; padding:10px 15px; background:rgba(255,255,255,0.05); border-radius:50px; border:1px solid var(--border-light); display:flex; align-items:center; gap:10px;"><i class="fa-solid fa-music" style="color:var(--danger-color);"></i><span style="font-size:12px; font-weight:700;">Original Audio - ${escapeHTML(safeName)}</span></div>` : '';

            return `<div class="post-card" id="post-${prefix}${post.id}" data-type="${postType}" style="display: ${displayStyle};"><div class="post-header"><div class="post-user-info" onclick="window.location.href='user_profile.html?uid=${postAuthorUid}'" style="cursor: pointer;"><img src="${safePic}" class="post-avatar" loading="lazy"><div><div class="post-real-name">${escapeHTML(safeName)}${verifiedIcon}</div>${locationHtml}<div class="post-real-time" style="margin-top:2px;">${timeAgo(post.timestamp)}${privacyIconHtml}</div></div></div>${optionsBtn}</div>${textContent ? `<div class="post-real-text">${escapeHTML(textContent)}</div>` : ''}${audioHtml}${mediaHtml}<div class="action-container"><div class="action-group"><button class="action-btn ${fireClass}" id="likeBtn-${prefix}${post.id}" onclick="toggleLike('${post.id}', '${postAuthorUid}')"><i class="${fireIcon}"></i> <span id="likeCount-${prefix}${post.id}">${likesCount > 0 ? likesCount : 'Burn'}</span></button>${post.commentsEnabled !== false ? `<button class="action-btn" onclick="openCommentsModal('${post.id}', '${postAuthorUid}')"><i class="fa-regular fa-comment"></i> <span>${totalComments > 0 ? totalComments : 'Discuss'}</span></button>` : `<button class="action-btn" style="opacity:0.5; cursor:not-allowed;"><i class="fa-solid fa-comment-slash"></i> <span>Off</span></button>`}</div><button class="action-btn" onclick="sharePost('${escapeHTML(textContent)}', '${url}')"><i class="fa-solid fa-share-nodes"></i></button></div>${post.commentsEnabled !== false ? `<div id="commentPreview-${prefix}${post.id}" class="comment-preview-area" style="display: ${totalComments > 0 ? 'block' : 'none'};">${latestCommentHtml}</div>` : ''}</div>`;
        }

        function updatePostUI(post) {
            ['', 'act-'].forEach(prefix => {
                const card = document.getElementById('post-' + prefix + post.id); if(!card) return;
                const hasLiked = currentUid && (post.likes || {})[currentUid]; const likesCount = Object.keys(post.likes || {}).length;
                const likeBtn = card.querySelector('#likeBtn-' + prefix + post.id);
                if (likeBtn) { likeBtn.className = `action-btn ${hasLiked ? 'fire-active' : ''}`; likeBtn.innerHTML = `<i class="${hasLiked ? 'fa-solid fa-fire-flame-curved' : 'fa-solid fa-fire'}"></i> <span>${likesCount > 0 ? likesCount : 'Burn'}</span>`; }
                let totalComments = 0; let latestCommentHtml = '';
                if (post.comments) {
                    const commentsArray = Object.values(post.comments); totalComments = commentsArray.length; commentsArray.forEach(c => { if (c.replies) totalComments += Object.keys(c.replies).length; });
                    const sortedComments = Object.values(post.comments).sort((a,b) => b.timestamp - a.timestamp);
                    if (sortedComments.length > 0) { const lc = sortedComments[0]; const lcAuthorData = allUsersData.find(u => u.uid === lc.uid) || {}; const lcName = lcAuthorData.name || lcAuthorData.fullName || lc.senderName || "User"; latestCommentHtml = `<div class="view-all-comments" onclick="openCommentsModal('${post.id}', '${post.uid || post.senderId}')">View all ${totalComments} comments</div><div class="latest-comment-preview" onclick="openCommentsModal('${post.id}', '${post.uid || post.senderId}')"><span>${escapeHTML(lcName)}</span> ${escapeHTML(lc.text)}</div>`; }
                }
                const previewDiv = card.querySelector('#commentPreview-' + prefix + post.id);
                if (previewDiv) { previewDiv.innerHTML = latestCommentHtml; previewDiv.style.display = totalComments > 0 ? 'block' : 'none'; }
            });
        }

        window.toggleLike = function(postId, postOwnerId) { if(!currentUid) return; const ref = db.ref(`social_feed/${postId}/likes/${currentUid}`); ref.once('value', snap => { if(snap.exists()) { ref.remove(); } else { ref.set(Date.now()); sendNotification(postOwnerId, 'like_post', postId); } }); }

        window.openCommentsModal = function(postId, postOwnerId) {
            currentCommentPostId = postId; currentCommentPostOwnerId = postOwnerId; document.getElementById('commentsModal').classList.add('active'); cancelReply(); 
            db.ref(`social_feed/${postId}/comments`).on('value', snap => {
                if(currentCommentPostId !== postId) return; const list = document.getElementById('commentsList'); list.innerHTML = '';
                if(!snap.exists()) { list.innerHTML = '<div style="text-align:center; padding:30px; font-weight:500; color:var(--text-muted);">No comments yet.</div>'; return; }
                snap.forEach(child => {
                    const c = { id: child.key, ...child.val() }; const commentAuthorUid = c.uid; const cAuthorData = allUsersData.find(u => u.uid === commentAuthorUid) || {}; const safeName = cAuthorData.name || cAuthorData.fullName || c.senderName || 'User'; const safePic = cAuthorData.profile_image || cAuthorData.profilePic || c.senderPic || `https://ui-avatars.com/api/?name=${encodeURIComponent(safeName)}\x26background=1e293b\x26color=f8fafc`;
                    list.innerHTML += `<div class="comment-item"><div class="comment-header" onclick="window.location.href='user_profile.html?uid=${commentAuthorUid}'" style="cursor:pointer;"><img src="${safePic}"><span class="comment-name">${escapeHTML(safeName)}</span><span class="comment-time">${timeAgo(c.timestamp)}</span></div><div class="comment-text">${escapeHTML(c.text)}</div><div class="comment-actions" onclick="startReply('${c.id}', '${escapeHTML(safeName)}', '${commentAuthorUid}')">Reply</div>${buildRepliesHTML(c.replies)}</div>`;
                });
                setTimeout(() => list.scrollTop = list.scrollHeight, 100);
            });
        }

        function buildRepliesHTML(repliesObj) {
            if (!repliesObj) return ''; let html = '<div class="reply-list">';
            Object.keys(repliesObj).forEach(key => {
                const r = repliesObj[key]; const replyAuthorUid = r.uid; const rAuthorData = allUsersData.find(u => u.uid === replyAuthorUid) || {}; const safeName = rAuthorData.name || rAuthorData.fullName || r.senderName || 'User'; const safePic = rAuthorData.profile_image || rAuthorData.profilePic || r.senderPic || `https://ui-avatars.com/api/?name=${encodeURIComponent(safeName)}\x26background=1e293b\x26color=f8fafc`;
                html += `<div style="margin-bottom:12px;"><div class="comment-header" onclick="window.location.href='user_profile.html?uid=${replyAuthorUid}'" style="cursor:pointer;"><img src="${safePic}" style="width:24px; height:24px; border-radius:50%;"><span class="comment-name" style="font-size:12px;">${escapeHTML(safeName)}</span><span class="comment-time" style="font-size:10px;">${timeAgo(r.timestamp)}</span></div><div class="comment-text" style="font-size:13px; padding-left:34px;">${escapeHTML(r.text)}</div></div>`;
            }); return html + '</div>';
        }

        window.closeCommentsModal = function() { if(currentCommentPostId) db.ref(`social_feed/${currentCommentPostId}/comments`).off(); document.getElementById('commentsModal').classList.remove('active'); currentCommentPostId = null; }
        
        let replyingToCommentId = null; let replyingToCommentOwnerId = null;
        window.startReply = function(commentId, userName, replyAuthorId) { replyingToCommentId = commentId; replyingToCommentOwnerId = replyAuthorId; document.getElementById('replyBanner').style.display = 'flex'; document.getElementById('replyingToText').innerText = `Replying to ${userName}`; document.getElementById('commentInput').focus(); }
        window.cancelReply = function() { replyingToCommentId = null; replyingToCommentOwnerId = null; document.getElementById('replyBanner').style.display = 'none'; document.getElementById('commentInput').value = ''; }
        
        window.submitComment = async function() {
            const input = document.getElementById('commentInput'); const text = input.value.trim(); if(!text || !currentCommentPostId) return;
            const dpName = (currentUserData && currentUserData.name) ? currentUserData.name : (currentUserData && currentUserData.fullName ? currentUserData.fullName : 'User'); const safePic = currentUserData ? (currentUserData.profile_image || currentUserData.profilePic || '') : '';
            const commentData = { uid: currentUid, text: text, timestamp: firebase.database.ServerValue.TIMESTAMP, senderName: dpName, senderPic: safePic };
            try {
                if (replyingToCommentId) { await db.ref(`social_feed/${currentCommentPostId}/comments/${replyingToCommentId}/replies`).push(commentData); sendNotification(replyingToCommentOwnerId, 'reply_comment', currentCommentPostId, text); } 
                else { await db.ref(`social_feed/${currentCommentPostId}/comments`).push(commentData); sendNotification(currentCommentPostOwnerId, 'comment_post', currentCommentPostId, text); }
                input.value = ''; cancelReply();
            } catch (err) { showToast("Failed", "error"); }
        }

        function openStoryViewer(uid) { if(!storyGroups[uid]) return; viewingUid = uid; viewingIndex = 0; document.getElementById('storyViewerModal').classList.add('active'); renderStoryContent(); }
        function renderStoryContent() {
            isPaused = false; const stories = storyGroups[viewingUid];
            if(!stories || viewingIndex >= stories.length || viewingIndex < 0) { closeStoryViewer(); return; }
            const s = stories[viewingIndex];
            const authorData = allUsersData.find(u => u.uid === viewingUid) || {}; const safeName = authorData.name || authorData.fullName || s.senderName || 'User'; const dp = authorData.profile_image || authorData.profilePic || s.senderPic || `https://ui-avatars.com/api/?name=${encodeURIComponent(safeName)}\x26background=fff`;
            
            document.getElementById('svAvatar').src = dp; document.getElementById('svName').innerText = safeName; document.getElementById('svTime').innerText = timeAgo(s.timestamp);
            const barsContainer = document.getElementById('storyProgressBars'); barsContainer.innerHTML = '';
            for(let i=0; i<stories.length; i++) { barsContainer.innerHTML += `<div style="flex:1; height:4px; background:rgba(255,255,255,0.3); border-radius:4px; overflow:hidden;"><div id="pb-${i}" style="height:100%; background:#fff; width:${i<viewingIndex?'100%':'0%'}; transition:width 0.05s linear;"></div></div>`; }

            const contentArea = document.getElementById('svContent');
            if(s.mediaType === 'video') { contentArea.innerHTML = `<video src="${s.mediaUrl}" autoplay playsinline style="width:100%; height:100vh; object-fit:contain;"></video>`; const vid = contentArea.querySelector('video'); vid.onended = () => nextStory(); vid.onloadedmetadata = () => startProgress(vid.duration || 5); } 
            else { contentArea.innerHTML = `<img src="${s.mediaUrl}" style="width:100%; height:100vh; object-fit:contain;">`; startProgress(5); }

            if (s.uid !== currentUid) {
                db.ref(`stories/${s.id}/viewers/${currentUid}`).set(Date.now()); document.getElementById('storyCreatorControls').style.display = 'none'; document.getElementById('storyViewerControls').style.display = 'flex';
                const replyInput = document.getElementById('storyReplyInput'); replyInput.value = ''; replyInput.onkeydown = function(e) { if(e.key === 'Enter' && this.value.trim() !== '') { sendNotification(s.uid, 'reply_story', s.id, this.value.trim()); showToast('Reply sent to ' + safeName, 'success'); this.value = ''; } };
                const likeIcon = document.getElementById('storyLikeIcon'); const btn = document.getElementById('storyLikeBtn');
                if(s.likes && s.likes[currentUid]) { likeIcon.className = "fa-solid fa-fire-flame-curved"; btn.classList.add('fire-active'); } else { likeIcon.className = "fa-solid fa-fire"; btn.classList.remove('fire-active'); }
                btn.onclick = () => toggleStoryLike(s.id, s.uid);
            } else {
                document.getElementById('storyViewerControls').style.display = 'none';
                const viewsCount = s.viewers ? Object.keys(s.viewers).length : 0; const likesCount = s.likes ? Object.keys(s.likes).length : 0;
                document.getElementById('storyViewCount').innerText = viewsCount; document.getElementById('storyLikeCountLabel').innerText = likesCount; document.getElementById('stModalViewCount').innerText = viewsCount; document.getElementById('stModalLikeCount').innerText = likesCount; document.getElementById('storyCreatorControls').style.display = 'flex';
            }
        }

        function toggleStoryLike(storyId, storyOwnerId) { const ref = db.ref(`stories/${storyId}/likes/${currentUid}`); const icon = document.getElementById('storyLikeIcon'); const btn = document.getElementById('storyLikeBtn'); if (btn.classList.contains('fire-active')) { icon.className = 'fa-solid fa-fire'; btn.classList.remove('fire-active'); ref.remove(); } else { icon.className = 'fa-solid fa-fire-flame-curved'; btn.classList.add('fire-active'); ref.set(Date.now()); sendNotification(storyOwnerId, 'like_story', storyId); } }
        function handleStoryPress() { isPaused = true; clearInterval(storyTimer); const vid = document.querySelector('#svContent video'); if(vid) vid.pause(); }
        function handleStoryRelease(dir) { isPaused = false; const vid = document.querySelector('#svContent video'); if(vid) vid.play(); if(dir==='left') prevStory(); else if(dir==='right') nextStory(); }
        function startProgress(duration) { clearInterval(storyTimer); storyProgressWidth = 0; const fillBar = document.getElementById(`pb-${viewingIndex}`); const step = (100 / (duration * 1000)) * 50; storyTimer = setInterval(() => { if(isPaused) return; storyProgressWidth += step; if(fillBar) fillBar.style.width = `${storyProgressWidth}%`; if(storyProgressWidth >= 100) nextStory(); }, 50); }
        function nextStory() { viewingIndex++; renderStoryContent(); } function prevStory() { viewingIndex--; renderStoryContent(); }
        function closeStoryViewer() { clearInterval(storyTimer); document.getElementById('storyViewerModal').classList.remove('active'); document.getElementById('svContent').innerHTML = ''; }
        
        window.openStoryViewersList = function() {
            isPaused = true; const vid = document.querySelector('#svContent video'); if(vid) vid.pause(); document.getElementById('storyViewersModal').classList.add('active'); const list = document.getElementById('storyViewersList'); list.innerHTML = '';
            const s = storyGroups[viewingUid][viewingIndex]; if(!s.viewers) { list.innerHTML = '<div style="text-align:center; padding: 40px; color:var(--text-muted); font-weight:600;">No viewers yet.</div>'; return; }
            Object.keys(s.viewers).forEach(viewerUid => { const u = allUsersData.find(user => user.uid === viewerUid); if(u) { const safeName = u.name || u.fullName || 'User'; const img = u.profile_image || u.profilePic || `https://ui-avatars.com/api/?name=${encodeURIComponent(safeName)}\x26background=e2e8f0`; const likedHtml = (s.likes && s.likes[viewerUid]) ? `<i class="fa-solid fa-fire viewer-like-icon" style="color:var(--danger-color)"></i>` : ''; list.innerHTML += `<div class="viewer-item" onclick="window.location.href='user_profile.html?uid=${viewerUid}'"><img src="${img}" class="viewer-avatar"><div style="flex:1; margin-left:12px;"><div class="viewer-name">${escapeHTML(safeName)}</div></div>${likedHtml}</div>`; } });
        }
        window.closeStoryViewersList = function() { document.getElementById('storyViewersModal').classList.remove('active'); isPaused = false; const vid = document.querySelector('#svContent video'); if(vid) vid.play(); }

    // ]]>
    </script>
    
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => { 
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83))) { 
                e.preventDefault(); return false; 
            } 
        });
    </script>
</body>
