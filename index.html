    <style>
        /* =========================================
           PREMIUM "RAMA" THEME (Teal/Cyan)
           ========================================= */
        :root {
            --bg-main: #f8fafc; 
            --bg-card: #ffffff; 
            --primary: #0d9488; 
            --primary-hover: #0f766e;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --text-inverted: #ffffff; 
            --border-light: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444; 
            --shadow-soft: 0 4px 10px rgba(0, 0, 0, 0.04);
            --shadow-btn: 0 4px 12px rgba(13, 148, 136, 0.25);
            --radius-card: 16px;
            --radius-btn: 12px;
            --skeleton-base: #e2e8f0;
            --skeleton-shine: #f8fafc;
        }

        body.dark-mode {
            --bg-main: #020617; 
            --bg-card: #0f172a; 
            --primary: #14b8a6; 
            --primary-hover: #2dd4bf;
            --text-dark: #f8fafc;
            --text-muted: #94a3b8;
            --text-inverted: #020617; 
            --border-light: #1e293b;
            --shadow-btn: 0 4px 12px rgba(20, 184, 166, 0.2);
            --skeleton-base: #1e293b;
            --skeleton-shine: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; background: var(--bg-main); color: var(--text-dark); overflow: hidden; }
        button { cursor: pointer; border: none; background: transparent; outline: none; transition: 0.2s; }
        a { text-decoration: none; }
        
        .global-overlay { display: flex; position: fixed; inset: 0; background: var(--bg-main); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border-light); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        .skeleton { background: var(--skeleton-base); background-image: linear-gradient(90deg, var(--skeleton-base) 0px, var(--skeleton-shine) 40px, var(--skeleton-base) 80px); background-size: 1000px 100%; animation: shimmer 2s infinite linear; border-radius: 4px; }
        .skeleton-card { display: flex; align-items: center; padding: 12px 16px; margin-bottom: 12px; border: 1px solid var(--border-light); border-radius: var(--radius-card); background: var(--bg-card); }
        .skeleton-avatar { width: 48px; height: 48px; border-radius: 50%; margin-right: 16px; min-width: 48px; }
        .skeleton-text-1 { height: 14px; width: 50%; margin-bottom: 8px; }
        .skeleton-text-2 { height: 12px; width: 30%; }

        /* SIDEBAR */
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; opacity: 0; visibility: hidden; transition: 0.3s ease; }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        .sidebar { position: fixed; top: 0; left: 0; height: 100%; width: 280px; background: var(--bg-card); z-index: 200; transform: translateX(-100%); transition: 0.3s ease; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.05); }
        .sidebar.active { transform: translateX(0); }
        .sidebar-header { padding: 30px 20px 20px; background: var(--bg-main); border-bottom: 1px solid var(--border-light); position: relative; }
        .close-sidebar-btn { position: absolute; top: 20px; right: 20px; font-size: 20px; color: var(--text-muted); width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; border-radius: 50%; }
        .sidebar-avatar { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; margin-bottom: 12px; background: var(--bg-card); }
        .sidebar-user-name { font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
        .sidebar-user-email { font-size: 13px; color: var(--text-muted); word-break: break-all; }
        .sidebar-menu { flex: 1; overflow-y: auto; padding: 20px 0; }
        .sidebar-link { display: flex; align-items: center; gap: 15px; padding: 14px 24px; color: var(--text-dark); font-size: 15px; font-weight: 500; transition: background 0.2s; }
        .sidebar-link i { font-size: 18px; color: var(--text-muted); width: 20px; text-align: center; }
        .sidebar-link:hover { background: var(--bg-main); color: var(--primary); }
        .sidebar-link:hover i { color: var(--primary); }
        .sidebar-divider { height: 1px; background: var(--border-light); margin: 10px 20px; }
        .text-danger { color: var(--danger) !important; }
        .text-danger i { color: var(--danger) !important; }

        /* Top Navbar */
        .top-navbar { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); border-bottom: 1px solid var(--border-light); }
        .nav-actions-wrap { display: flex; align-items: center; gap: 10px; }
        .icon-btn { font-size: 18px; color: var(--text-dark); width: 36px; height: 36px; border-radius: var(--radius-btn); display: flex; align-items: center; justify-content: center; transition: background 0.2s; position: relative; }
        .icon-btn:hover { background: var(--bg-main); }
        .logo-text { font-weight: 800; font-size: 18px; color: var(--text-dark); letter-spacing: -0.5px; flex: 1; padding-left: 15px; }
        .notif-badge { position: absolute; top: 4px; right: 6px; background: var(--danger); color: white; font-size: 10px; font-weight: 800; padding: 2px 5px; border-radius: 10px; border: 2px solid var(--bg-card); display: none; }
        .premium-badge { background: var(--primary); color: var(--text-inverted); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 4px; box-shadow: var(--shadow-btn); }

        /* Main Content Area */
        .main-container { height: calc(100% - 130px); overflow-y: auto; padding: 0 20px; padding-bottom: 20px; }
        .page-title-area { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        .page-title-area h1 { font-size: 28px; font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px; }
        .title-actions { display: flex; gap: 8px; }
        .circle-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border-light); color: var(--text-dark); display: flex; justify-content: center; align-items: center; font-size: 16px; box-shadow: var(--shadow-soft); }
        .section-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

        .verified-icon { width: 14px; height: 14px; margin-left: 4px; display: inline-flex; align-items: center; justify-content: center; }

        .chat-card { background: var(--bg-card); border-radius: var(--radius-card); padding: 12px 16px; display: flex; align-items: center; margin-bottom: 12px; border: 1px solid var(--border-light); box-shadow: var(--shadow-soft); cursor: pointer; transition: 0.2s; }
        .chat-card:active { transform: scale(0.98); }
        .chat-avatar-wrap { position: relative; width: 52px; height: 52px; margin-right: 16px; min-width: 52px; cursor: pointer; }
        .chat-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-light); }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--bg-card); background: var(--text-muted); }
        .status-dot.online { background: var(--success); }
        .chat-info { flex: 1; overflow: hidden; cursor: pointer; }
        .chat-name { font-size: 16px; font-weight: 700; color: var(--text-dark); display: flex; align-items: center; margin-bottom: 4px; white-space: nowrap; }
        .chat-status { font-size: 13px; color: var(--text-muted); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .icon-action-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-main); color: var(--primary); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-light); font-size: 16px; margin-left: 10px; transition: 0.2s; }
        .icon-action-btn:active { transform: scale(0.9); background: var(--border-light); }

        .empty-state { text-align: center; padding: 40px 20px; }
        .empty-state i { font-size: 48px; color: var(--border-light); margin-bottom: 16px; display: block; }
        .empty-state h3 { font-size: 18px; color: var(--text-dark); margin-bottom: 8px; font-weight: 700; }
        .empty-state p { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 24px; }
        
        .search-users-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--primary); color: white; border: none; border-radius: 12px; padding: 14px 24px; font-size: 15px; font-weight: 600; box-shadow: var(--shadow-btn); margin: 0 auto; cursor:pointer;}

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); display: flex; justify-content: space-around; padding: 12px 10px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border-light); box-shadow: 0 -4px 10px rgba(0,0,0,0.02); z-index: 50; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); text-decoration: none; width: 60px; transition: 0.2s; }
        .nav-item i { font-size: 22px; transition: transform 0.2s; }
        .nav-item:active i { transform: scale(0.8); }
        .nav-item span { font-size: 10px; font-weight: 600; }
        .nav-item.active { color: var(--primary); }

        /* MODALS (Notifications & Search) */
        .notif-screen, .search-screen { display: none; position: fixed; inset: 0; background: var(--bg-main); z-index: 250; flex-direction: column; animation: slideInRight 0.3s ease-out; }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        .notif-header, .search-header { background: var(--bg-card); padding: 16px 20px calc(16px + env(safe-area-inset-top)); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border-light); box-shadow: var(--shadow-soft); }
        .notif-header h2 { font-size: 20px; font-weight: 800; color: var(--text-dark); flex: 1; }
        .notif-list-container { flex: 1; overflow-y: auto; padding: 10px 0; }
        .notif-item { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border-light); background: var(--bg-card); cursor: pointer; }
        .notif-item.unread { background: rgba(13, 148, 136, 0.05); }
        .notif-icon-wrap { width: 48px; height: 48px; border-radius: 50%; background: var(--bg-main); display: flex; align-items: center; justify-content: center; margin-right: 15px; font-size: 20px; color: var(--primary); overflow: hidden; }
        .notif-content { flex: 1; }
        .notif-content h4 { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
        .notif-content p { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
        .notif-time { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-top: 6px; }

        .search-input-wrapper { flex: 1; background: var(--bg-main); border-radius: 20px; padding: 12px 16px; border: 1px solid var(--border-light); display: flex; align-items: center; gap: 10px; }
        .search-input-wrapper i { color: var(--text-muted); font-size: 14px; }
        .search-input-wrapper input { width: 100%; border: none; background: transparent; outline: none; font-size: 15px; color: var(--text-dark); font-weight: 500;}
        .search-results-container { flex: 1; padding: 16px 20px; overflow-y: auto; }

        /* CHAT SCREEN */
        .chat-screen { display: none; position: fixed; inset: 0; background: var(--bg-main); z-index: 300; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .chat-header { background: var(--bg-card); padding: 12px 16px calc(12px + env(safe-area-inset-top)); display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-light); box-shadow: var(--shadow-soft); z-index: 10; }
        .back-btn { font-size: 20px; color: var(--text-dark); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
        
        /* DETAILS (INFO) ICON RESTORED */
        .chat-header-actions { display: flex; align-items: center; gap: 16px; color: var(--text-muted); font-size: 22px; padding-right: 5px; }

        .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; position: relative; }
        
        /* PROFESSIONAL ENGLISH E2E BANNER */
        .e2e-notice-wrapper { display: flex; justify-content: center; margin: 10px 0 24px 0; }
        .e2e-notice-box { background: rgba(13, 148, 136, 0.1); color: var(--primary); padding: 10px 18px; border-radius: 12px; font-size: 11px; font-weight: 600; text-align: center; max-width: 95%; line-height: 1.5; border: 1px solid rgba(13, 148, 136, 0.2); }

        .msg-bubble { max-width: 75%; padding: 12px 16px; font-size: 15px; line-height: 1.4; word-wrap: break-word; box-shadow: var(--shadow-soft); }
        .msg-bubble img { width: 100%; border-radius: 8px; margin-bottom: 6px; }
        .msg-received { background: var(--bg-card); color: var(--text-dark); border-radius: 16px 16px 16px 4px; border: 1px solid var(--border-light); }
        .msg-sent { background: var(--primary); color: var(--text-inverted); border-radius: 16px 16px 4px 16px; box-shadow: var(--shadow-btn); }
        
        .chat-input-area { background: var(--bg-card); padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--border-light); }
        .chat-input-wrapper { flex: 1; background: var(--bg-main); border-radius: 24px; padding: 12px 16px; border: 1px solid var(--border-light); display: flex; align-items: center; }
        .chat-input-wrapper input { width: 100%; border: none; background: transparent; outline: none; font-size: 15px; color: var(--text-dark); font-weight: 500;}
        
        /* CHAT GPT STYLE SEND BUTTON */
        .send-btn { width: 42px; height: 42px; background: var(--text-dark); color: var(--bg-card); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; box-shadow: var(--shadow-soft); transition: 0.2s; }
        body.dark-mode .send-btn { background: var(--bg-card); color: var(--text-dark); }
        .send-btn:active { transform: scale(0.9); }

        /* TOAST SYSTEM */
        .toast-container { position: fixed; top: 20px; right: 20px; left: 20px; z-index: 999999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; align-items: center;}
        .toast { background: var(--text-dark); color: var(--bg-card); padding: 14px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-lg); animation: slideInDownToast 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transition: all 0.3s ease; pointer-events: auto;}
        @keyframes slideInDownToast { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast.hiding { transform: translateY(-50px); opacity: 0; }

    </style>
</head>

                <input type="text" id="searchInput" placeholder="Search users by name..." autocomplete="off">
            </div>
        </div>
        <div class="search-results-container" id="searchResults"></div>
    </div>

    <div class="chat-screen" id="chatCard">
        <div class="chat-header">
            <button class="back-btn" onclick="closeChatRoom()"><i class="fa-solid fa-chevron-left"></i></button>
            <img id="chatHeaderImg" src="" style="width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-light);" alt="User" onclick="openUserProfile(currentChatUserId)">
            <div style="flex:1;" onclick="openUserProfile(currentChatUserId)">
                <h3 id="chatHeaderName" style="font-size: 17px; font-weight: 700; display:flex; align-items:center;">User</h3>
                <div id="chatHeaderStatus" style="font-size: 13px; color: var(--text-muted); font-weight: 500;">Connecting...</div>
            </div>
            
            <div class="chat-header-actions">
                <i class="fa-solid fa-circle-info" style="cursor: pointer;" onclick="showToast('Profile Details', 'info'); openUserProfile(currentChatUserId);"></i>
            </div>
        </div>
        
        <div class="chat-messages" id="chatBox"></div>
        
        <div class="chat-input-area">
            <button style="font-size: 22px; color: var(--text-muted);" onclick="document.getElementById('chatImageInput').click()">
                <i class="fa-regular fa-image"></i>
            </button>
            <div class="chat-input-wrapper">
                <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
            </div>
            <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-arrow-up"></i></button>
        </div>
    </div>

    <script>
        // =========================================
        // 1. FIREBASE INITIALIZATION & CONFIG
        // =========================================
        const firebaseConfig = {
            apiKey: "AIzaSyC9T2Y5txsjo1qHvjEx6j3iN_4NMzyK9Qw",
            authDomain: "fahimn-co-in.firebaseapp.com",
            databaseURL: "https://fahimn-co-in-default-rtdb.firebaseio.com",
            projectId: "fahimn-co-in",
            storageBucket: "fahimn-co-in.firebasestorage.app",
            messagingSenderId: "698585907618",
            appId: "1:698585907618:web:c8e4a6646b6b8f5c7932fb"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const db = firebase.database();
        const auth = firebase.auth();

        // Global Variables
        let myUserId = null;
        let currentChatUserId = null;
        let allUsersData = [];
        let recentChatsIds = [];
        let unreadNotifCount = 0;

        // SVG Badge
        const verifiedRedBadgeSVG = `<span class="verified-icon"><svg aria-label="Verified" fill="var(--danger)" height="15" viewBox="0 0 40 40" width="15"><path d="M19.998 3.094 14.638 0l-2.972 5.15H5.432v6.354L0 14.64 3.094 20 0 25.359l5.432 3.137v5.905h5.975L14.638 40l5.36-3.094L25.358 40l3.232-5.6h6.162v-6.01L40 25.359 36.905 20 40 14.641l-5.248-3.03v-6.46h-6.419L25.358 0l-5.36 3.094Zm7.415 11.225 2.254 2.287-11.43 11.5-6.835-6.93 2.244-2.258 4.587 4.581 9.18-9.18Z" fill-rule="evenodd"></path></svg></span>`;

        // =========================================
        // 2. UI UTILITY FUNCTIONS & TOASTS
        // =========================================

        let toastQueue = [];
        let isToastShowing = false;

        function showToast(msg, type='info') {
            toastQueue.push({msg, type});
            if(!isToastShowing) processToastQueue();
        }

        function processToastQueue() {
            if(toastQueue.length === 0) { 
                isToastShowing = false; 
                return; 
            }
            
            isToastShowing = true;
            const current = toastQueue.shift();
            const box = document.getElementById('toastBox');
            
            const toast = document.createElement('div');
            toast.className = `toast`;
            
            let icon = 'fa-info-circle'; 
            let color = 'white';
            
            if(current.type === 'success') { 
                icon = 'fa-check-circle'; 
                color = 'var(--success)'; 
            }
            
            if(current.type === 'error') { 
                icon = 'fa-exclamation-circle'; 
                color = 'var(--danger)'; 
            }
            
            toast.innerHTML = `<i class="fa-solid ${icon}" style="color:${color}; font-size:16px;"></i> <span>${current.msg}</span>`;
            box.appendChild(toast);
            
            if(navigator.vibrate) navigator.vibrate(50);

            setTimeout(() => { 
                toast.classList.add('hiding'); 
                setTimeout(() => { 
                    toast.remove(); 
                    processToastQueue(); 
                }, 300); 
            }, 2500);
        }

        function getSkeletonHTML() {
            let html = '';
            for(let i=0; i<4; i++) {
                html += `<div class="skeleton-card"><div class="skeleton skeleton-avatar"></div><div style="flex:1;"><div class="skeleton skeleton-text-1"></div><div class="skeleton skeleton-text-2"></div></div></div>`;
            }
            return html;
        }

        // Initialize skeletons before data loads
        document.getElementById('recentChatsList').innerHTML = getSkeletonHTML();

        // 100% STRICT STRING CHECKING FOR BUG PREVENTION
        function escapeHTML(str) { 
            if (str === null || str === undefined) return '';
            return String(str).replace(/[<>'"]/g, tag => ({ 
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' 
            }[tag])); 
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            if(document.getElementById('sidebar').classList.contains('active')) {
                toggleSidebar();
            }
        }

        function logoutUser() {
            if(confirm("Are you sure you want to log out?")) {
                auth.signOut().then(() => { 
                    window.location.replace("auth.html"); 
                });
            }
        }

        function timeAgo(timestamp) {
            const seconds = Math.floor((new Date() - new Date(timestamp)) / 1000);
            let interval = seconds / 31536000; if (interval > 1) return Math.floor(interval) + "y ago";
            interval = seconds / 2592000; if (interval > 1) return Math.floor(interval) + "mo ago";
            interval = seconds / 86400; if (interval > 1) return Math.floor(interval) + "d ago";
            interval = seconds / 3600; if (interval > 1) return Math.floor(interval) + "h ago";
            interval = seconds / 60; if (interval > 1) return Math.floor(interval) + "m ago";
            return "Just now";
        }

        // =========================================
        // 3. NOTIFICATION SYSTEM
        // =========================================
        function openNotifications() {
            document.getElementById('notificationScreen').style.display = 'flex';
            unreadNotifCount = 0;
            updateNotifBadge();
        }

        function closeNotifications() {
            document.getElementById('notificationScreen').style.display = 'none';
        }

        function updateNotifBadge() {
            const badge = document.getElementById('notifBadgeCount');
            if(unreadNotifCount > 0) {
                badge.style.display = 'block';
                badge.innerText = unreadNotifCount > 9 ? '9+' : unreadNotifCount;
            } else {
                badge.style.display = 'none';
            }
        }

        function listenForNotifications() {
            const notifList = document.getElementById('notifListContainer');
            
            db.ref('messages').limitToLast(20).on('child_added', snap => {
                const msg = snap.val();
                
                if(msg.receiverId === myUserId && (Date.now() - msg.timestamp < 86400000)) {
                    
                    if(document.getElementById('notificationScreen').style.display !== 'flex') {
                        unreadNotifCount++;
                        updateNotifBadge();
                    }

                    const senderData = allUsersData.find(u => u.uid === msg.senderId);
                    const sName = senderData ? senderData.name : 'Someone';
                    const sImg = senderData ? senderData.profile_image : `https://ui-avatars.com/api/?name=${encodeURIComponent(sName)}&background=0d9488&color=fff`;

                    if(notifList.innerHTML.includes('No new notifications')) {
                        notifList.innerHTML = '';
                    }

                    const previewText = msg.imageUrl ? "📷 Sent an image" : `"${escapeHTML(msg.text).substring(0, 40)}..."`;

                    const notifHTML = `
                        <div class="notif-item unread" onclick="openChatFromSearch('${msg.senderId}', '${escapeHTML(sName)}', '${sImg}', ${senderData?.verified})">
                            <div class="notif-icon-wrap">
                                <img src="${sImg}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
                            </div>
                            <div class="notif-content">
                                <h4>New Message from ${escapeHTML(sName)}</h4>
                                <p>${previewText}</p>
                                <div class="notif-time">${timeAgo(msg.timestamp)}</div>
                            </div>
                        </div>
                    `;
                    
                    notifList.insertAdjacentHTML('afterbegin', notifHTML);
                }
            });
        }

        // =========================================
        // 4. SEARCH SYSTEM (BUG FREE & PRIVACY)
        // =========================================
        let searchTimeout;
        
        function openSearchScreen() {
            document.getElementById('searchScreen').style.display = 'flex';
            document.getElementById('searchInput').focus();
            document.getElementById('searchResults').innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:40px; font-weight: 500;"><i class="fa-solid fa-magnifying-glass" style="font-size:32px; margin-bottom:12px; display:block; opacity:0.3;"></i>Type a name to search...</p>';
        }

        function closeSearchScreen() {
            document.getElementById('searchScreen').style.display = 'none';
            document.getElementById('searchInput').value = '';
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(searchTimeout);
            const q = e.target.value.trim();
            
            if (q === '') {
                document.getElementById('searchResults').innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:40px; font-weight: 500;"><i class="fa-solid fa-magnifying-glass" style="font-size:32px; margin-bottom:12px; display:block; opacity:0.3;"></i>Type a name to search...</p>';
                return;
            }
            
            document.getElementById('searchResults').innerHTML = getSkeletonHTML();
            
            searchTimeout = setTimeout(() => { 
                renderSearchResults(q.toLowerCase()); 
            }, 300);
        });

        function renderSearchResults(q) {
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '';
            
            const filtered = allUsersData.filter(u => {
                // VERY STRICT CHECK TO PREVENT CRASHES
                if (!u || !u.name) return false;
                const safeName = String(u.name).toLowerCase();
                return safeName.includes(q); 
            });

            if (filtered.length === 0) {
                resultsDiv.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:40px; font-weight: 500;">No users found.</p>';
                return;
            }

            filtered.forEach(u => {
                const safeName = u.name || 'Unknown User';
                const safeImg = u.profile_image || `https://ui-avatars.com/api/?name=${encodeURIComponent(safeName)}&background=0d9488&color=fff`;
                const verifiedIcon = (u.verified === true) ? verifiedRedBadgeSVG : '';
                
                resultsDiv.innerHTML += `
                    <div class="chat-card">
                        <div class="chat-avatar-wrap" onclick="openUserProfile('${u.uid}')">
                            <img src="${safeImg}" class="chat-avatar" onerror="this.src='https://ui-avatars.com/api/?name=User&background=0d9488&color=fff'">
                        </div>
                        <div class="chat-info" onclick="openUserProfile('${u.uid}')">
                            <div class="chat-name">${escapeHTML(safeName)} ${verifiedIcon}</div>
                            <div class="chat-status">Tap to open profile</div>
                        </div>
                        <button class="icon-action-btn" onclick="openChatFromSearch('${u.uid}', '${escapeHTML(safeName)}', '${safeImg}', ${u.verified === true}); event.stopPropagation();">
                            <i class="fa-regular fa-message"></i>
                        </button>
                    </div>`;
            });
        }

        function openUserProfile(uid) {
            closeSearchScreen();
            closeNotifications();
            window.location.href = 'user_profile.html?uid=' + uid;
        }

        function openChatFromSearch(uid, name, avatar, isVerified) {
            closeSearchScreen();
            closeNotifications();
            openChatRoom(uid, name, avatar, isVerified);
        }

        // =========================================
        // 5. AUTHENTICATION & CORE LOGIC
        // =========================================
        auth.onAuthStateChanged((user) => {
            document.getElementById('globalOverlay').style.display = 'none';
            
            if (user) {
                myUserId = user.uid;
                
                syncUserToDatabase(user); 
                monitorAdminStatus();
                fetchRecentChats();
                listenForNotifications();
                
                let fallbackName = user.email ? user.email.split('@')[0] : 'User';
                const dName = user.displayName || fallbackName;
                const profileImg = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(dName)}&background=0d9488&color=fff&bold=true`;
                
                document.getElementById('sbUserName').innerText = dName;
                document.getElementById('sbUserEmail').innerText = user.email || 'No Email';
                document.getElementById('sbProfileImg').src = profileImg;

                if (typeof OneSignal !== 'undefined') {
                    OneSignalDeferred.push(function(OneSignal) { 
                        OneSignal.login(myUserId); 
                    });
                }

                // SMART REDIRECT CHECK (If coming from user_profile.html?chat=UID)
                const urlParams = new URLSearchParams(window.location.search);
                const chatTargetUid = urlParams.get('chat');
                
                if(chatTargetUid) {
                    db.ref('users/' + chatTargetUid).once('value').then(snap => {
                        if(snap.exists()) {
                            const u = snap.val();
                            const sName = u.name || 'User';
                            const sImg = u.profile_image || `https://ui-avatars.com/api/?name=${encodeURIComponent(sName)}&background=0d9488&color=fff`;
                            openChatRoom(u.uid, escapeHTML(sName), sImg, u.verified);
                            
                            // Remove param from URL cleanly
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    });
                }

            } else {
                window.location.replace("auth.html");
            }
        });

        function syncUserToDatabase(user) {
            db.ref('users/' + user.uid).once('value').then(snap => {
                if (!snap.val()) {
                    let fallbackName = user.email ? user.email.split('@')[0] : 'User';
                    const dName = user.displayName || fallbackName;
                    const profileImg = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(dName)}&background=0d9488&color=fff&bold=true`;
                    
                    db.ref('users/' + user.uid).update({
                        uid: user.uid, 
                        name: dName, 
                        email: user.email || '', 
                        profile_image: profileImg, 
                        last_login: Date.now()
                    });
                }
            });
        }

        function monitorAdminStatus() {
            db.ref('admin_details/profile_image').on('value', (snapshot) => {
                if (snapshot.val()) {
                    document.getElementById('adminImg').src = snapshot.val();
                }
            });

            db.ref('/status/admin_fahim').on('value', snap => {
                const data = snap.val() || {status: 'offline'};
                const dot = document.getElementById('adminStatusDot');
                const text = document.getElementById('adminStatusText');
                
                if (data.status === 'online') {
                    dot.className = 'status-dot online';
                    text.innerText = 'Online';
                    text.style.color = 'var(--success)';
                } else {
                    dot.className = 'status-dot';
                    text.innerText = 'Offline';
                    text.style.color = 'var(--text-muted)';
                }
            });

            // Handle online/offline presence for current user
            db.ref('.info/connected').on('value', (snap) => { 
                if (snap.val() === true) { 
                    db.ref('/status/' + myUserId).set({status: 'online'}); 
                    db.ref('/status/' + myUserId).onDisconnect().set({status: 'offline'}); 
                } 
            });
        }

        function fetchRecentChats() {
            // Load all users for search & references
            db.ref('users').on('value', snap => {
                allUsersData = [];
                snap.forEach(child => { 
                    if(child.val().uid !== myUserId) {
                        allUsersData.push(child.val()); 
                    }
                });
                
                // RENDER FIX: Call it here to prevent blank screen if this loads after recent_chats
                renderRecentChatsList();
            });

            // Load recent chat history
            db.ref('users/' + myUserId + '/recent_chats').orderByValue().on('value', snap => {
                recentChatsIds = []; 
                snap.forEach(child => { 
                    recentChatsIds.unshift(child.key); 
                }); 
                renderRecentChatsList();
            });
        }

        function renderRecentChatsList() {
            const listDiv = document.getElementById('recentChatsList');
            const actualRecent = recentChatsIds.filter(id => id !== 'admin_fahim');
            
            // FIX: Show empty state immediately if no recent chats
            if(actualRecent.length === 0) {
                listDiv.innerHTML = `
                    <div class="empty-state" id="emptyState">
                        <i class="fa-regular fa-comments"></i>
                        <h3>No messages yet</h3>
                        <p>Start a new conversation and connect<br>with your network.</p>
                        <button class="search-users-btn" onclick="openSearchScreen()">
                            <i class="fa-solid fa-magnifying-glass" style="margin-right: 8px;"></i> Find People
                        </button>
                    </div>`;
                return;
            } 
            
            // FIX: Wait for all users data to load before rendering cards to prevent blank screen
            if (allUsersData.length === 0) {
                listDiv.innerHTML = getSkeletonHTML();
                return;
            }
            
            listDiv.innerHTML = '';
            actualRecent.forEach(uid => {
                const u = allUsersData.find(user => user.uid === uid);
                if(u) {
                    const safeName = u.name || 'Unknown User';
                    const safeImg = u.profile_image || `https://ui-avatars.com/api/?name=${encodeURIComponent(safeName)}&background=0d9488&color=fff`;
                    const verifiedIcon = (u.verified === true) ? verifiedRedBadgeSVG : '';
                    
                    listDiv.innerHTML += `
                        <div class="chat-card" onclick="openChatRoom('${u.uid}', '${escapeHTML(safeName)}', '${safeImg}', ${u.verified === true})">
                            <div class="chat-avatar-wrap" onclick="openUserProfile('${u.uid}'); event.stopPropagation();">
                                <img src="${safeImg}" class="chat-avatar" onerror="this.src='https://ui-avatars.com/api/?name=User&background=0d9488&color=fff'">
                            </div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHTML(safeName)} ${verifiedIcon}</div>
                                <div class="chat-status">Tap to open conversation</div>
                            </div>
                        </div>`;
                }
            });
        }

        // =========================================
        // 6. CHAT ROOM & IMAGE UPLOAD LOGIC
        // =========================================
        
        window.openChatRoom = function(targetUid, targetName, targetAvatar, isVerified = false) {
            currentChatUserId = targetUid;
            document.getElementById('chatCard').style.display = 'flex';
            
            const verifiedIcon = isVerified ? verifiedRedBadgeSVG : '';
            document.getElementById('chatHeaderName').innerHTML = targetName + verifiedIcon;
            document.getElementById('chatHeaderImg').src = targetAvatar;
            
            db.ref('/status/' + targetUid).on('value', snap => { 
                if(currentChatUserId === targetUid) { 
                    const isOnline = snap.val()?.status === 'online';
                    document.getElementById('chatHeaderStatus').innerText = isOnline ? 'Online • Connected to satellite 🛰️' : 'Offline';
                    document.getElementById('chatHeaderStatus').style.color = isOnline ? 'var(--success)' : 'var(--text-muted)';
                } 
            });
            
            loadMessages();
        }

        window.closeChatRoom = function() {
            currentChatUserId = null;
            document.getElementById('chatCard').style.display = 'none';
            db.ref('/status/' + currentChatUserId).off();
        }

        // Handle Image Upload for Chat
        document.getElementById('chatImageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file || !currentChatUserId) return;
            
            const overlay = document.getElementById('globalOverlay');
            document.getElementById('overlayText').innerText = "Sending image...";
            overlay.style.display = 'flex';
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'qrkdzja7');
            
            fetch('https://api.cloudinary.com/v1_1/dowwvgffp/upload', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                overlay.style.display = 'none';
                
                db.ref(`messages`).push({ 
                    imageUrl: data.secure_url,
                    text: '', 
                    senderId: myUserId, 
                    receiverId: currentChatUserId, 
                    timestamp: firebase.database.ServerValue.TIMESTAMP 
                });
                
                db.ref('users/' + myUserId + '/recent_chats/' + currentChatUserId).set(Date.now());
                db.ref('users/' + currentChatUserId + '/recent_chats/' + myUserId).set(Date.now());
            })
            .catch(err => {
                overlay.style.display = 'none';
                showToast("Failed to send image", "error");
            });
            
            this.value = ''; 
        });

        // Load Messages and Display Proper E2E Banner
        function loadMessages() {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = '';
            
            db.ref(`messages`).orderByChild('timestamp').limitToLast(50).on('value', (snap) => {
                
                // PROFESSIONAL ENGLISH E2E BANNER IN CHAT
                const e2eBanner = `
                <div class="e2e-notice-wrapper">
                    <div class="e2e-notice-box">
                        <i class="fa-solid fa-lock" style="margin-right:4px;"></i> Messages are end-to-end encrypted. No one outside of this chat can read them.
                    </div>
                </div>`;
                
                chatBox.innerHTML = e2eBanner;
                
                snap.forEach((child) => {
                    const data = child.val();
                    const isMyChat = (data.senderId === myUserId && data.receiverId === currentChatUserId) || (data.senderId === currentChatUserId && data.receiverId === myUserId);
                    
                    if(isMyChat) {
                        const isMe = data.senderId === myUserId;
                        const msgClass = isMe ? 'msg-sent' : 'msg-received';
                        
                        let senderLabel = '';
                        if(!isMe) {
                            const senderNameText = document.getElementById('chatHeaderName').innerText.trim();
                            senderLabel = `<div style="font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; margin-left: 4px; letter-spacing: 0.5px;">${senderNameText}</div>`;
                        }

                        let msgContentHTML = '';
                        if (data.imageUrl) {
                            msgContentHTML = `<img src="${escapeHTML(data.imageUrl)}" style="width: 100%; border-radius: 8px; margin-bottom: ${data.text ? '6px' : '0'}; display: block;">`;
                        }
                        if (data.text) {
                            msgContentHTML += escapeHTML(data.text);
                        }

                        chatBox.innerHTML += `
                        <div style="display: flex; flex-direction: column; align-items: ${isMe ? 'flex-end' : 'flex-start'}; margin-bottom: 8px;">
                            ${senderLabel}
                            <div class="msg-bubble ${msgClass}">
                                ${msgContentHTML}
                            </div>
                            <div style="font-size: 9px; color: var(--text-muted); margin-top: 4px; margin-${isMe ? 'right' : 'left'}: 4px;">
                                ${new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                            </div>
                        </div>`;
                    }
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        window.sendMessage = function() {
            const input = document.getElementById('msgInput');
            if(!input.value.trim() || !currentChatUserId) return;
            
            db.ref(`messages`).push({ 
                text: input.value.trim(), 
                senderId: myUserId, 
                receiverId: currentChatUserId, 
                timestamp: firebase.database.ServerValue.TIMESTAMP 
            });
            
            db.ref('users/' + myUserId + '/recent_chats/' + currentChatUserId).set(Date.now());
            db.ref('users/' + currentChatUserId + '/recent_chats/' + myUserId).set(Date.now());
            
            input.value = '';
        }

        document.getElementById('msgInput').addEventListener('keypress', e => { 
            if (e.key === 'Enter') {
                sendMessage(); 
            }
        });

    </script>
</body>
